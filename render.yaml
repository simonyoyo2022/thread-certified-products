services:
  - type: web
    name: thread-certified-products
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/status
    envVars:
      - key: IS_CLOUD
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: "production"
